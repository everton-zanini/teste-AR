<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <title>AR Festa Junina</title>
  
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
      font-family: Arial, sans-serif;
    }
    #camera-fundo {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      object-fit: cover;
      z-index: -1;
    }
    
    /* Estilos da nossa nova Tela Inicial */
    #tela-inicial {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: rgba(0, 0, 0, 0.85); /* Fundo escuro transparente */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999; /* Fica por cima de tudo */
      color: white;
      text-align: center;
    }
    #botao-comecar {
      margin-top: 20px;
      padding: 15px 40px;
      font-size: 20px;
      font-weight: bold;
      background-color: #E74C3C; /* Vermelho junino */
      color: white;
      border: 3px dashed white;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    #botao-foto {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 5000;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: bold;
      background: #ffffff;
      color: #222222;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      opacity: 0.92;
    }
    #botao-video {
      position: fixed;
      left: 16px;
      bottom: 18px;
      z-index: 5000;
      padding: 12px 18px;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: bold;
      background: #ffffff;
      color: #222222;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      opacity: 0.92;
    }
    #botao-video.gravando {
      background: #c62828;
      color: #ffffff;
    }
    #botao-foto:active {
      transform: scale(0.97);
    }
    #botao-video:active {
      transform: scale(0.97);
    }
    #flash-captura {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 7000;
      transition: opacity 120ms linear;
    }
    #status-captura {
      position: fixed;
      left: 50%;
      bottom: 78px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: #ffffff;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 6000;
      opacity: 0;
      transition: opacity 160ms linear;
      pointer-events: none;
    }
    #contador-gravacao {
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      background: rgba(198, 40, 40, 0.88);
      color: #ffffff;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: bold;
      z-index: 6500;
      opacity: 0;
      transition: opacity 140ms linear;
      pointer-events: none;
    }
  </style>

  <script>
    // Agora o script espera o clique no botão para fazer a mágica
    window.addEventListener('load', function() {
      const botao = document.getElementById('botao-comecar');
      const botaoFoto = document.getElementById('botao-foto');
      const botaoVideo = document.getElementById('botao-video');
      const telaInicial = document.getElementById('tela-inicial');
      const musica = document.getElementById('musica-fundo');
      const flashCaptura = document.getElementById('flash-captura');
      const statusCaptura = document.getElementById('status-captura');
      const contadorGravacao = document.getElementById('contador-gravacao');
      const cenaAr = document.getElementById('cena-ar');
      const canvasGravacao = document.createElement('canvas');

      const LIMITE_GRAVACAO_SEGUNDOS = 15;

      let streamCameraAtual = null;
      let streamMicrofoneAtual = null;
      let mediaRecorder = null;
      let fluxoGravacao = null;
      let pedacoVideo = [];
      let animacaoGravacaoId = null;
      let tempoRestanteGravacao = LIMITE_GRAVACAO_SEGUNDOS;
      let intervaloContadorId = null;
      let timeoutAutoPararId = null;

      const atualizarContador = function(segundos) {
        contadorGravacao.textContent = 'Gravando: ' + segundos + 's';
      };

      const iniciarContadorGravacao = function() {
        tempoRestanteGravacao = LIMITE_GRAVACAO_SEGUNDOS;
        atualizarContador(tempoRestanteGravacao);
        contadorGravacao.style.opacity = '1';

        intervaloContadorId = setInterval(function() {
          tempoRestanteGravacao -= 1;
          if (tempoRestanteGravacao <= 0) {
            tempoRestanteGravacao = 0;
            atualizarContador(tempoRestanteGravacao);
            clearInterval(intervaloContadorId);
            intervaloContadorId = null;
            return;
          }

          atualizarContador(tempoRestanteGravacao);
        }, 1000);
      };

      const encerrarContadorGravacao = function() {
        if (intervaloContadorId) {
          clearInterval(intervaloContadorId);
          intervaloContadorId = null;
        }

        if (timeoutAutoPararId) {
          clearTimeout(timeoutAutoPararId);
          timeoutAutoPararId = null;
        }

        contadorGravacao.style.opacity = '0';
      };

      const encerrarMicrofoneAtual = function() {
        if (streamMicrofoneAtual) {
          streamMicrofoneAtual.getTracks().forEach(function(track) {
            track.stop();
          });
          streamMicrofoneAtual = null;
        }
      };

      const renderizarQuadroGravacao = function() {
        if (!mediaRecorder || mediaRecorder.state !== 'recording') {
          return;
        }

        const video = document.getElementById('camera-fundo');
        const canvasAr = cenaAr && cenaAr.renderer && cenaAr.renderer.domElement
          ? cenaAr.renderer.domElement
          : (cenaAr ? cenaAr.canvas : null);

        if (!video.srcObject || !canvasAr) {
          animacaoGravacaoId = requestAnimationFrame(renderizarQuadroGravacao);
          return;
        }

        const largura = video.videoWidth || window.innerWidth;
        const altura = video.videoHeight || window.innerHeight;
        if (canvasGravacao.width !== largura || canvasGravacao.height !== altura) {
          canvasGravacao.width = largura;
          canvasGravacao.height = altura;
        }

        const ctx = canvasGravacao.getContext('2d');
        ctx.drawImage(video, 0, 0, largura, altura);
        ctx.drawImage(canvasAr, 0, 0, largura, altura);

        animacaoGravacaoId = requestAnimationFrame(renderizarQuadroGravacao);
      };

      const pararGravacao = function() {
        if (!mediaRecorder) {
          return;
        }

        encerrarContadorGravacao();

        if (animacaoGravacaoId) {
          cancelAnimationFrame(animacaoGravacaoId);
          animacaoGravacaoId = null;
        }

        if (mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }

        botaoVideo.classList.remove('gravando');
        botaoVideo.textContent = 'Gravar Video';
      };

      const tipoMimeSuportado = function() {
        const tipos = [
          'video/webm;codecs=vp9',
          'video/webm;codecs=vp8',
          'video/webm'
        ];

        for (let i = 0; i < tipos.length; i++) {
          if (
            window.MediaRecorder &&
            typeof MediaRecorder.isTypeSupported === 'function' &&
            MediaRecorder.isTypeSupported(tipos[i])
          ) {
            return tipos[i];
          }
        }

        return '';
      };

      const mostrarStatus = function(mensagem) {
        statusCaptura.textContent = mensagem;
        statusCaptura.style.opacity = '1';
        setTimeout(function() {
          statusCaptura.style.opacity = '0';
        }, 1500);
      };

      // Garante loop continuo mesmo em navegadores com comportamento diferente
      musica.loop = true;
      musica.addEventListener('ended', function() {
        musica.currentTime = 0;
        musica.play();
      });

      botaoFoto.addEventListener('click', function() {
        const video = document.getElementById('camera-fundo');

        if (!video.srcObject || video.readyState < 2) {
          mostrarStatus('Ative a camera primeiro.');
          return;
        }

        const canvasAr = cenaAr && cenaAr.renderer && cenaAr.renderer.domElement
          ? cenaAr.renderer.domElement
          : (cenaAr ? cenaAr.canvas : null);

        if (!cenaAr || !canvasAr) {
          mostrarStatus('Cena AR ainda carregando.');
          return;
        }

        const capturarEExportar = function() {
          const largura = video.videoWidth || window.innerWidth;
          const altura = video.videoHeight || window.innerHeight;
          const quadro = document.createElement('canvas');
          quadro.width = largura;
          quadro.height = altura;

          const ctx = quadro.getContext('2d');
          ctx.drawImage(video, 0, 0, largura, altura);
          ctx.drawImage(canvasAr, 0, 0, largura, altura);

          flashCaptura.style.opacity = '0.88';
          setTimeout(function() {
            flashCaptura.style.opacity = '0';
          }, 100);

          const nomeArquivo = 'arraia-ar-' + Date.now() + '.jpg';
          quadro.toBlob(function(blob) {
            if (!blob) {
              mostrarStatus('Falha ao gerar a foto.');
              return;
            }

            const imagem = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = imagem;
            link.download = nomeArquivo;

            if (typeof link.download === 'string') {
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              mostrarStatus('Foto salva no dispositivo.');
            } else {
              window.open(imagem, '_blank');
              mostrarStatus('Foto aberta em nova aba.');
            }
          }, 'image/jpeg', 0.92);
        };

        // Forca um render do frame atual antes da leitura do canvas WebGL.
        if (cenaAr.renderer && cenaAr.object3D && cenaAr.camera) {
          cenaAr.renderer.render(cenaAr.object3D, cenaAr.camera);
        }

        requestAnimationFrame(capturarEExportar);
      });

      botaoVideo.addEventListener('click', async function() {
        const video = document.getElementById('camera-fundo');

        if (mediaRecorder && mediaRecorder.state === 'recording') {
          pararGravacao();
          mostrarStatus('Finalizando video...');
          return;
        }

        if (!window.MediaRecorder) {
          mostrarStatus('Seu navegador nao suporta gravacao.');
          return;
        }

        if (!video.srcObject || video.readyState < 2) {
          mostrarStatus('Ative a camera primeiro.');
          return;
        }

        const canvasAr = cenaAr && cenaAr.renderer && cenaAr.renderer.domElement
          ? cenaAr.renderer.domElement
          : (cenaAr ? cenaAr.canvas : null);

        if (!canvasAr) {
          mostrarStatus('Cena AR ainda carregando.');
          return;
        }

        const largura = video.videoWidth || window.innerWidth;
        const altura = video.videoHeight || window.innerHeight;
        canvasGravacao.width = largura;
        canvasGravacao.height = altura;

        let streamMicrofoneTemporario = null;
        try {
          streamMicrofoneTemporario = await navigator.mediaDevices.getUserMedia({
            audio: {
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true
            }
          });
          streamMicrofoneAtual = streamMicrofoneTemporario;
        } catch (erroMic) {
          console.warn('Microfone nao autorizado ou indisponivel:', erroMic);
          mostrarStatus('Microfone negado. Gravando sem audio.');
        }

        pedacoVideo = [];
        fluxoGravacao = canvasGravacao.captureStream(30);

        if (streamMicrofoneAtual) {
          streamMicrofoneAtual.getAudioTracks().forEach(function(track) {
            fluxoGravacao.addTrack(track);
          });
        }

        const tipoMime = tipoMimeSuportado();
        try {
          mediaRecorder = tipoMime
            ? new MediaRecorder(fluxoGravacao, { mimeType: tipoMime })
            : new MediaRecorder(fluxoGravacao);
        } catch (erro) {
          console.error('Erro ao iniciar MediaRecorder:', erro);
          mostrarStatus('Nao foi possivel iniciar a gravacao.');
          encerrarMicrofoneAtual();
          return;
        }

        mediaRecorder.ondataavailable = function(evento) {
          if (evento.data && evento.data.size > 0) {
            pedacoVideo.push(evento.data);
          }
        };

        mediaRecorder.onstop = function() {
          const blob = new Blob(pedacoVideo, { type: tipoMime || 'video/webm' });

          if (fluxoGravacao) {
            fluxoGravacao.getTracks().forEach(function(track) {
              track.stop();
            });
          }

          encerrarMicrofoneAtual();

          if (!blob || blob.size === 0) {
            mostrarStatus('Falha ao gerar o video.');
            mediaRecorder = null;
            fluxoGravacao = null;
            return;
          }

          const urlVideo = URL.createObjectURL(blob);
          const nomeArquivo = 'arraia-ar-video-' + Date.now() + '.webm';
          const link = document.createElement('a');
          link.href = urlVideo;
          link.download = nomeArquivo;

          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);

          setTimeout(function() {
            URL.revokeObjectURL(urlVideo);
          }, 1500);

          mostrarStatus('Video salvo no dispositivo.');
          mediaRecorder = null;
          fluxoGravacao = null;
        };

        mediaRecorder.start(250);
        botaoVideo.classList.add('gravando');
        botaoVideo.textContent = 'Parar Gravacao';
        mostrarStatus(streamMicrofoneAtual ? 'Gravando video com microfone...' : 'Gravando video...');
        iniciarContadorGravacao();

        timeoutAutoPararId = setTimeout(function() {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            pararGravacao();
            mostrarStatus('Limite de 15s atingido.');
          }
        }, LIMITE_GRAVACAO_SEGUNDOS * 1000);

        // Forca um render do frame atual antes de iniciar a captura continua.
        if (cenaAr.renderer && cenaAr.object3D && cenaAr.camera) {
          cenaAr.renderer.render(cenaAr.object3D, cenaAr.camera);
        }

        renderizarQuadroGravacao();
      });

      botao.addEventListener('click', function() {
        // 1. Mantem a musica de fundo parada para usar o audio ambiente do microfone.
        musica.pause();
        musica.currentTime = 0;

        // 2. Esconde a tela inicial
        telaInicial.style.display = 'none';

        // 3. Pede permissão e liga a câmera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
          .then(function(stream) {
            const video = document.getElementById('camera-fundo');
            video.srcObject = stream;
            streamCameraAtual = stream;
          })
          .catch(function(erro) {
            console.error("Erro ao acessar a câmera: ", erro);
            alert("Por favor, permita o acesso à câmera para ver a mágica!");
          });
      });

      window.addEventListener('beforeunload', function() {
        if (streamCameraAtual) {
          streamCameraAtual.getTracks().forEach(function(track) {
            track.stop();
          });
        }

        encerrarMicrofoneAtual();

        if (mediaRecorder && mediaRecorder.state === 'recording') {
          mediaRecorder.stop();
        }
      });
    });

    AFRAME.registerComponent('logo-overlay', {
      schema: {
        asset: { type: 'selector' },
        baseHeight: { type: 'number', default: 0.38 }
      },

      init: function () {
        const el = this.el;
        const img = this.data.asset;

        const ajustarProporcao = () => {
          if (!img || !img.naturalWidth || !img.naturalHeight) {
            return;
          }

          const proporcao = img.naturalWidth / img.naturalHeight;
          const altura = this.data.baseHeight;
          const largura = altura * proporcao;

          el.setAttribute('height', altura);
          el.setAttribute('width', largura);
        };

        const aplicarCamadaFrontal = () => {
          el.object3D.renderOrder = 9999;
          el.object3D.traverse(function (node) {
            node.renderOrder = 9999;
            node.frustumCulled = false;

            if (node.isMesh) {
              node.onBeforeRender = function (renderer) {
                renderer.clearDepth();
              };
            }

            if (node.material) {
              node.material.depthTest = false;
              node.material.depthWrite = false;
              node.material.transparent = true;
              node.material.needsUpdate = true;
            }
          });
        };

        if (img && img.complete) {
          ajustarProporcao();
        } else if (img) {
          img.addEventListener('load', ajustarProporcao, { once: true });
        }

        if (el.hasLoaded) {
          aplicarCamadaFrontal();
        } else {
          el.addEventListener('loaded', aplicarCamadaFrontal, { once: true });
        }

        this.aplicarCamadaFrontal = aplicarCamadaFrontal;
      },

      tick: function () {
        if (this.aplicarCamadaFrontal) {
          this.aplicarCamadaFrontal();
        }
      }
    });

    AFRAME.registerComponent('camada-fundo', {
      schema: {
        ordem: { type: 'number', default: 10 }
      },

      init: function () {
        this.aplicarCamada = () => {
          const ordem = this.data.ordem;
          this.el.object3D.renderOrder = ordem;
          this.el.object3D.traverse(function (node) {
            node.renderOrder = ordem;
            if (node.material) {
              node.material.depthTest = true;
              node.material.depthWrite = true;
              node.material.needsUpdate = true;
            }
          });
        };

        if (this.el.hasLoaded) {
          this.aplicarCamada();
        } else {
          this.el.addEventListener('loaded', this.aplicarCamada, { once: true });
        }
      },

      tick: function () {
        if (this.aplicarCamada) {
          this.aplicarCamada();
        }
      }
    });

    // O gerador de balões continua igualzinho
    AFRAME.registerComponent('gerador-de-baloes', {
      init: function () {
        const cena = this.el;
        const cores = ['#FF5733', '#F4D03F', '#48C9B0', '#AF7AC5', '#E74C3C', '#5DADE2'];
        
        for (let i = 0; i < 100; i++) {
          let balao = document.createElement('a-entity');
          
          let x = (Math.random() - 0.5) * 35; 
          let y = (Math.random() * 4) - 2.5; 
          let z = (Math.random() - 0.5) * 35;
          
          if (Math.abs(x) < 1.5 && Math.abs(z) < 1.5) { 
             z = -2 - (Math.random() * 3); 
          }

          balao.setAttribute('position', `${x} ${y} ${z}`);
          
          let corCima = cores[Math.floor(Math.random() * cores.length)];
          let corBaixo = cores[Math.floor(Math.random() * cores.length)];
          
          balao.innerHTML = `
            <a-cone radius-bottom="0.5" radius-top="0" height="0.8" position="0 0.4 0" color="${corCima}" opacity="0.9"></a-cone>
            <a-cone radius-bottom="0.5" radius-top="0" height="0.8" position="0 -0.4 0" rotation="180 0 0" color="${corBaixo}" opacity="0.9"></a-cone>
          `;

          let alturaDestino = y + 12; 
          let duracao = 8000 + Math.random() * 6000; 
          
          balao.setAttribute('animation__voar', `property: position; to: ${x} ${alturaDestino} ${z}; loop: true; dur: ${duracao}; easing: linear`);
          balao.setAttribute('animation__girar', `property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear`);
          balao.setAttribute('camada-fundo', 'ordem: 10');

          cena.appendChild(balao);
        }
      }
    });

    // Gerador de fogos de artificio para enriquecer o cenario
    AFRAME.registerComponent('gerador-de-fogos', {
      init: function () {
        const cena = this.el;
        const coresExplosao = ['#FFD166', '#FF6B6B', '#4ECDC4', '#F7FFF7', '#F94144', '#F9C74F'];

        const criarParticula = (origem, cor) => {
          const particula = document.createElement('a-sphere');
          const direcaoX = (Math.random() - 0.5) * 10;
          const direcaoY = (Math.random() - 0.1) * 7;
          const direcaoZ = (Math.random() - 0.5) * 10;
          const destino = `${origem.x + direcaoX} ${origem.y + direcaoY} ${origem.z + direcaoZ}`;

          particula.setAttribute('radius', 0.05 + Math.random() * 0.03);
          particula.setAttribute('position', `${origem.x} ${origem.y} ${origem.z}`);
          particula.setAttribute('color', cor);
          particula.setAttribute('opacity', '0.95');
          particula.setAttribute('camada-fundo', 'ordem: 10');
          particula.setAttribute('animation__explodir', `property: position; to: ${destino}; dur: 1100; easing: easeOutQuad`);
          particula.setAttribute('animation__sumir', 'property: material.opacity; to: 0; dur: 1100; easing: linear');

          cena.appendChild(particula);
          setTimeout(() => particula.parentNode && particula.parentNode.removeChild(particula), 1200);
        };

        const dispararFogo = () => {
          const x = (Math.random() - 0.5) * 24;
          const z = -3 - Math.random() * 18;
          const alturaExplosao = 4 + Math.random() * 4;

          const foguete = document.createElement('a-sphere');
          foguete.setAttribute('radius', '0.06');
          foguete.setAttribute('color', '#FFFFFF');
          foguete.setAttribute('position', `${x} -2 ${z}`);
          foguete.setAttribute('camada-fundo', 'ordem: 10');
          foguete.setAttribute('animation__subir', `property: position; to: ${x} ${alturaExplosao} ${z}; dur: 1200; easing: easeOutCubic`);

          cena.appendChild(foguete);

          setTimeout(() => {
            if (foguete.parentNode) {
              foguete.parentNode.removeChild(foguete);
            }

            const corBase = coresExplosao[Math.floor(Math.random() * coresExplosao.length)];
            const totalParticulas = 42 + Math.floor(Math.random() * 24);
            for (let i = 0; i < totalParticulas; i++) {
              criarParticula({ x, y: alturaExplosao, z }, corBase);
            }

            const clarão = document.createElement('a-light');
            clarão.setAttribute('type', 'point');
            clarão.setAttribute('position', `${x} ${alturaExplosao} ${z}`);
            clarão.setAttribute('color', corBase);
            clarão.setAttribute('intensity', '2.6');
            clarão.setAttribute('distance', '12');
            clarão.setAttribute('animation', 'property: intensity; from: 2.6; to: 0; dur: 350; easing: easeOutQuad');
            cena.appendChild(clarão);

            setTimeout(() => clarão.parentNode && clarão.parentNode.removeChild(clarão), 450);
          }, 1200);
        };

        setTimeout(() => {
          dispararFogo();
          this.intervaloFogos = setInterval(() => {
            dispararFogo();
            setTimeout(dispararFogo, 260);
          }, 1200);
        }, 1000);
      },

      remove: function () {
        if (this.intervaloFogos) {
          clearInterval(this.intervaloFogos);
        }
      }
    });
  </script>
</head>
<body>
  
  <!-- Nosso tocador de música invisível -->
  <!-- A tag 'loop' faz a música voltar para o início quando acaba -->
  <audio id="musica-fundo" src="musica.mp3" loop preload="auto"></audio>

  <!-- Nossa Tela Inicial -->
  <div id="tela-inicial">
    <h1>Festa Caipira em AR!</h1>
    <p>Aumente o som e olhe ao redor.</p>
    <button id="botao-comecar">Entrar na Festa</button>
  </div>

  <button id="botao-video" type="button">Gravar Video</button>
  <button id="botao-foto" type="button">Tirar Foto</button>
  <div id="contador-gravacao">Gravando: 15s</div>
  <div id="status-captura"></div>
  <div id="flash-captura"></div>

  <video id="camera-fundo" autoplay playsinline></video>
  <a-scene id="cena-ar" renderer="alpha: true; preserveDrawingBuffer: true" gerador-de-baloes gerador-de-fogos vr-mode-ui="enabled: false">
    <a-assets>
      <img id="logo-ar" src="logo_ar.png" alt="Logo AR">

    <a-entity light="type: ambient; color: #FFF3D6; intensity: 0.9"></a-entity>

        logo-overlay="asset: #logo-ar; baseHeight: 1.00"
        position="0 0.9 -1.5"
        material="transparent: true; alphaTest: 0.05; depthTest: false; depthWrite: false; shader: flat; side: double"
      ></a-image>
    </a-entity>
  </a-scene>
